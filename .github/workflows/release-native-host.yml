name: Release Native Host

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-native-host:
    name: Build host (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_cmd: .\scripts\release\windows\build_host.ps1
            package_cmd: .\scripts\release\windows\package_portable.ps1
            artifact_path: results/release/pii-masker-native-host-windows.zip
          - os: macos-latest
            platform: macos
            build_cmd: ./scripts/release/macos/build_host.sh
            package_cmd: ./scripts/release/macos/package_portable.sh
            artifact_path: results/release/pii-masker-native-host-macos.tar.gz
          - os: ubuntu-latest
            platform: linux
            build_cmd: ./scripts/release/linux/build_host.sh
            package_cmd: ./scripts/release/linux/package_portable.sh
            artifact_path: results/release/pii-masker-native-host-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Ensure shell scripts executable
        if: runner.os != 'Windows'
        run: chmod +x scripts/release/${{ matrix.platform }}/*.sh

      - name: Build host (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_cmd }}

      - name: Build host (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_cmd }}

      - name: Package host artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.package_cmd }}

      - name: Package host artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.package_cmd }}

      - name: Upload host artifact
        uses: actions/upload-artifact@v4
        with:
          name: pii-masker-native-host-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  package-extension:
    name: Package extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          mkdir -p results/release
          cd chrome_extension
          zip -r "../results/release/pii-upload-redactor-extension.zip" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: pii-upload-redactor-extension
          path: results/release/pii-upload-redactor-extension.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-native-host
      - package-extension
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pii-*
          path: results/release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            results/release/pii-masker-native-host-windows.zip
            results/release/pii-masker-native-host-macos.tar.gz
            results/release/pii-masker-native-host-linux.tar.gz
            results/release/pii-upload-redactor-extension.zip
